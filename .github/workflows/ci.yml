name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli-only:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CLI only (no [web])
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: CLI smoke (core commands)
        run: |
          agentic-rubric --help
          agentic-rubric run --help
          agentic-rubric phase1 --help
          agentic-rubric grade --help
          agentic-rubric validate --help
          agentic-rubric eval-run --help
          agentic-rubric bench --help
          agentic-rubric acceptance --help
          agentic-rubric inspect-trace --help
          agentic-rubric init --help

  test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: CLI help (with web extra)
        run: |
          agentic-rubric --help
          agentic-rubric run --help
          agentic-rubric phase1 --help
          agentic-rubric grade --help
          agentic-rubric validate --help
          agentic-rubric eval-run --help
          agentic-rubric bench --help
          agentic-rubric acceptance --help
          agentic-rubric inspect-trace --help
          agentic-rubric ui --help

      - name: Acceptance gate (offline)
        run: scripts/acceptance.sh offline

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
